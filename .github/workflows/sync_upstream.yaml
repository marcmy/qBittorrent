name: Sync upstream after libtorrent

on:
  push:
    branches:
      - custom/master
    paths:
      - .github/workflows/sync_upstream.yaml
  repository_dispatch:
    types:
      - libtorrent-upstream-synced
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions: {}

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    name: Merge qBittorrent master
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: write

    steps:
      - name: Check out custom qBittorrent branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: custom/master
          fetch-depth: 0
          token: ${{ github.token }}
          persist-credentials: true

      - name: Fetch upstream qBittorrent master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add source https://github.com/qbittorrent/qBittorrent.git
          git fetch --prune --no-tags source master

      - name: Merge upstream while preserving fork workflows
        id: sync
        shell: bash
        run: |
          set -euo pipefail

          source_sha="$(git rev-parse source/master)"
          original_head="$(git rev-parse HEAD)"

          if git merge-base --is-ancestor source/master HEAD; then
            echo "custom/master already contains current upstream master."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            merge_status=0
            git merge --no-commit --no-ff source/master || merge_status=$?

            # Replace the entire workflow directory with the exact tree from
            # the fork before the merge. Removing it first also discards any
            # new workflow files introduced by upstream.
            git rm -r -f --ignore-unmatch .github/workflows
            if git cat-file -e "$original_head:.github/workflows" 2>/dev/null; then
              git checkout "$original_head" -- .github/workflows
            fi

            unresolved="$(git diff --name-only --diff-filter=U)"
            if [[ -n "$unresolved" ]]; then
              echo "::error::Unresolved upstream merge conflicts remain outside .github/workflows:"
              printf '%s\n' "$unresolved"
              exit 1
            fi

            if [[ "$merge_status" -ne 0 ]] && ! git rev-parse -q --verify MERGE_HEAD >/dev/null; then
              echo "::error::git merge failed without creating a resolvable merge state."
              exit "$merge_status"
            fi

            if ! git diff --quiet "$original_head" -- .github/workflows; then
              echo "::error::Fork workflow files changed during the upstream merge."
              git diff "$original_head" -- .github/workflows
              exit 1
            fi

            git commit --no-edit
            git push origin HEAD:refs/heads/custom/master
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Start Windows build against synced libtorrent
        if: >-
          github.event_name == 'workflow_dispatch' ||
          steps.sync.outputs.changed == 'true' ||
          github.event.client_payload.libtorrent_changed == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          LIBTORRENT_REF: ${{ github.event.client_payload.libtorrent_sha || 'custom/qbittorrent-2.1' }}
          QBITTORRENT_REF: ${{ steps.sync.outputs.head_sha }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci_windows.yaml',
              ref: 'custom/master',
              inputs: {
                libtorrent_ref: process.env.LIBTORRENT_REF,
                qbittorrent_ref: process.env.QBITTORRENT_REF
              }
            });

      - name: Summarize sync chain
        if: always()
        env:
          SOURCE_HEAD: ${{ steps.sync.outputs.source_sha }}
          QBITTORRENT_CHANGED: ${{ steps.sync.outputs.changed }}
          QBITTORRENT_HEAD: ${{ steps.sync.outputs.head_sha }}
          LIBTORRENT_CHANGED: ${{ github.event.client_payload.libtorrent_changed || 'manual-or-scheduled' }}
          LIBTORRENT_HEAD: ${{ github.event.client_payload.libtorrent_sha || 'custom/qbittorrent-2.1' }}
        run: |
          {
            echo "## Upstream sync chain"
            echo "- qBittorrent upstream head: $SOURCE_HEAD"
            echo "- qBittorrent custom changed: $QBITTORRENT_CHANGED"
            echo "- qBittorrent custom head: $QBITTORRENT_HEAD"
            echo "- libtorrent changed: $LIBTORRENT_CHANGED"
            echo "- libtorrent ref: $LIBTORRENT_HEAD"
          } >> "$GITHUB_STEP_SUMMARY"
