name: Sync upstream after libtorrent

on:
  repository_dispatch:
    types:
      - libtorrent-upstream-synced
  workflow_dispatch:

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    name: Sync qBittorrent and rebuild when needed
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: write

    steps:
      - name: Check out fork master
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: master
          fetch-depth: 0
          persist-credentials: true

      - name: Fetch upstream master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/qbittorrent/qBittorrent.git
          git fetch --prune --no-tags upstream master

      - name: Merge upstream master
        id: sync
        run: |
          if git merge-base --is-ancestor upstream/master HEAD; then
            echo "qBittorrent master is already current with upstream."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git merge --no-edit upstream/master
            git push origin HEAD:master
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

          echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Start Windows build against synced libtorrent
        if: >-
          github.event_name == 'workflow_dispatch' ||
          steps.sync.outputs.changed == 'true' ||
          github.event.client_payload.libtorrent_changed == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          LIBTORRENT_REF: ${{ github.event.client_payload.libtorrent_sha || 'RC_2_1' }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci_windows.yaml',
              ref: 'master',
              inputs: {
                libtorrent_ref: process.env.LIBTORRENT_REF
              }
            });

      - name: Summarize sync chain
        if: always()
        env:
          QBITTORRENT_CHANGED: ${{ steps.sync.outputs.changed }}
          QBITTORRENT_HEAD: ${{ steps.sync.outputs.head_sha }}
          LIBTORRENT_CHANGED: ${{ github.event.client_payload.libtorrent_changed || 'manual' }}
          LIBTORRENT_HEAD: ${{ github.event.client_payload.libtorrent_sha || 'RC_2_1' }}
        run: |
          {
            echo "## Upstream sync chain"
            echo "- qBittorrent changed: $QBITTORRENT_CHANGED"
            echo "- qBittorrent head: $QBITTORRENT_HEAD"
            echo "- libtorrent changed: $LIBTORRENT_CHANGED"
            echo "- libtorrent ref: $LIBTORRENT_HEAD"
          } >> "$GITHUB_STEP_SUMMARY"
