name: Update Scoop manifest

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI - Windows
    types:
      - completed

permissions:
  contents: read

jobs:
  dispatch:
    name: Trigger scoop-bucket Excavator
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch qbittorrent-custom update
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          repository: marcmy/scoop-bucket
          event-type: qbittorrent-custom-built
          client-payload: >-
            {"run_id":"${{ github.event.workflow_run.id || github.run_id }}","head_sha":"${{ github.event.workflow_run.head_sha || github.sha }}"}
