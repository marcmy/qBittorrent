name: CodeQL Advanced

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "22 13 * * 6"

# Deny all token capabilities unless a job explicitly grants them.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest

    permissions:
      # Upload CodeQL results to the repository security dashboard.
      security-events: write
      # Read repository contents and any private CodeQL packs.
      contents: read
      packages: read
      actions: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: c-cpp
            # qBittorrent's real build requires Qt, Boost and libtorrent setup.
            # No-build mode keeps CodeQL independent from the product CI while
            # still providing supported C/C++ source analysis.
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4.36.2
        with:
          category: /language:${{ matrix.language }}
