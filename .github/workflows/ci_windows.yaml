name: CI - Windows

on:
  pull_request:
  push:
  workflow_dispatch:
    inputs:
      libtorrent_ref:
        description: libtorrent branch, tag, or commit to build
        required: false
        default: RC_2_1
        type: string

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.head_ref != '' }}

jobs:
  ci:
    name: Build (marcmy/libtorrent ${{ inputs.libtorrent_ref || 'RC_2_1' }}, x64)
    runs-on: windows-latest
    permissions:
      actions: write

    env:
      boost_path: "${{ github.workspace }}/../boost"
      libtorrent_path: "${{ github.workspace }}/../libtorrent"
      vcpkg_path: "c:/vcpkg"
      target_arch: "x64"
      vcpkg_triplet: "x64-windows-static-md-release"
      qt_arch: "win64_msvc2022_64"
      libtorrent_repository: "marcmy/libtorrent"
      libtorrent_ref: "${{ inputs.libtorrent_ref || 'RC_2_1' }}"

    steps:
      - name: Checkout qBittorrent
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup devcmd
        uses: TheMrMilchmann/setup-msvc-dev@79dac248aac9d0059f86eae9d8b5bfab4e95e97c # v4.0.0
        with:
          arch: ${{ env.target_arch }}

      - name: Install build tools
        run: |
          if ((Get-Command "ninja.exe" -ErrorAction SilentlyContinue) -eq $null)
          {
            choco install ninja
          }
          where.exe ninja
          ninja --version

      # https://learn.microsoft.com/en-us/vcpkg/users/binarycaching#gha
      - name: Set variables for vcpkg
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', (process.env.ACTIONS_CACHE_URL || ''));
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', (process.env.ACTIONS_RUNTIME_TOKEN || ''));

      - name: Install dependencies with vcpkg
        run: |
          New-Item `
            -Force `
            -ItemType File `
            -Path "${{ env.vcpkg_path }}/triplets_overlay/${{ env.vcpkg_triplet }}.cmake"
          Add-Content `
            -Path "${{ env.vcpkg_path }}/triplets_overlay/${{ env.vcpkg_triplet }}.cmake" `
            -Value @("set(VCPKG_TARGET_ARCHITECTURE ${{ env.target_arch }})",
              "set(VCPKG_LIBRARY_LINKAGE static)",
              "set(VCPKG_CRT_LINKAGE dynamic)",
              "set(VCPKG_BUILD_TYPE release)")
          $packages = `
            "boost-build:${{ env.vcpkg_triplet }}",
            "openssl:${{ env.vcpkg_triplet }}",
            "zlib:${{ env.vcpkg_triplet }}"
          ${{ env.vcpkg_path }}/vcpkg.exe upgrade `
            --no-dry-run `
            --overlay-triplets="${{ env.vcpkg_path }}/triplets_overlay"
          ${{ env.vcpkg_path }}/vcpkg.exe install `
            --binarysource="clear;x-gha,readwrite" `
            --clean-after-build `
            --overlay-triplets="${{ env.vcpkg_path }}/triplets_overlay" `
            $packages

      - name: Install Boost
        env:
          boost_version: "1.91.0"
          boost_archive_version: "1_91_0"
        run: |
          $boost_url="https://archives.boost.io/release/${{ env.boost_version }}/source/boost_${{ env.boost_archive_version }}.tar.gz"
          $boost_url2="https://sourceforge.net/projects/boost/files/boost/${{ env.boost_version }}/boost_${{ env.boost_archive_version }}.tar.gz"
          curl -L -o "${{ runner.temp }}/boost.tar.gz" "$boost_url"
          tar -xf "${{ runner.temp }}/boost.tar.gz" -C "${{ github.workspace }}/.."
          if ($LastExitCode -ne 0)
          {
            curl -L -o "${{ runner.temp }}/boost.tar.gz" "$boost_url2"
            tar -xf "${{ runner.temp }}/boost.tar.gz" -C "${{ github.workspace }}/.."
          }
          move "${{ github.workspace }}/../boost_*" "${{ env.boost_path }}"
          cd "${{ env.boost_path }}"
          ${{ env.vcpkg_path }}/installed/${{ env.vcpkg_triplet }}/tools/boost-build/b2.exe `
            stage `
            toolset=msvc `
            --stagedir=.\ `
            --with-headers

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4
        with:
          version: "6.10.3"
          arch: ${{ env.qt_arch }}
          archives: qtbase qtsvg qttools
          modules: qtimageformats
          cache: true

      - name: Build and install custom libtorrent
        run: |
          git init "${{ env.libtorrent_path }}"
          cd "${{ env.libtorrent_path }}"
          git remote add origin "https://github.com/${{ env.libtorrent_repository }}.git"
          git fetch --depth 1 origin "${{ env.libtorrent_ref }}"
          git checkout --detach FETCH_HEAD
          git submodule update --init --recursive --depth 1

          $libtorrentSha = git rev-parse HEAD
          $libtorrentShortSha = git rev-parse --short=12 HEAD
          $requestedRef = "${{ env.libtorrent_ref }}"
          $libtorrentRefSafe = if ($requestedRef -match '^[0-9A-Fa-f]{40}$')
          {
            "RC_2_1"
          }
          else
          {
            $requestedRef -replace '[^A-Za-z0-9._-]', '-'
          }
          "LIBTORRENT_SHA=$libtorrentSha" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LIBTORRENT_SHA_SHORT=$libtorrentShortSha" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LIBTORRENT_REF_SAFE=$libtorrentRefSafe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          $env:CFLAGS+=" /guard:cf"
          $env:CXXFLAGS+=" /guard:cf"
          $env:LDFLAGS+=" /GUARD:CF"
          cmake `
            -B build `
            -G "Ninja" `
            -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            -DCMAKE_CXX_STANDARD=20 `
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON `
            -DCMAKE_INSTALL_PREFIX="${{ env.libtorrent_path }}/install" `
            -DCMAKE_TOOLCHAIN_FILE="${{ env.vcpkg_path }}/scripts/buildsystems/vcpkg.cmake" `
            -DBOOST_ROOT="${{ env.boost_path }}/lib/cmake" `
            -DBUILD_SHARED_LIBS=OFF `
            -Ddeprecated-functions=OFF `
            -Dstatic_runtime=OFF `
            -DVCPKG_TARGET_TRIPLET=${{ env.vcpkg_triplet }} `
            -Dwebtorrent=ON
          cmake --build build
          cmake --install build

      - name: Build qBittorrent
        run: |
          $env:CXXFLAGS+="/DQT_FORCE_ASSERTS /WX"
          cmake `
            -B build `
            -G "Ninja" `
            -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON `
            -DCMAKE_TOOLCHAIN_FILE="${{ env.vcpkg_path }}/scripts/buildsystems/vcpkg.cmake" `
            -DBOOST_ROOT="${{ env.boost_path }}/lib/cmake" `
            -DLibtorrentRasterbar_DIR="${{ env.libtorrent_path }}/install/lib/cmake/LibtorrentRasterbar" `
            -DMSVC_RUNTIME_DYNAMIC=ON `
            -DTESTING=ON `
            -DVCPKG_TARGET_TRIPLET=${{ env.vcpkg_triplet }} `
            -DVERBOSE_CONFIGURE=ON `
            --graphviz=build/target_graph.dot
          cmake --build build --target qbt_update_translations
          cmake --build build
          cmake --build build --target check

      - name: Prepare build artifacts
        run: |
          mkdir upload
          mkdir upload/qBittorrent
          copy build/qbittorrent.exe upload/qBittorrent
          copy build/qbittorrent.pdb upload/qBittorrent
          copy dist/windows/qt.conf upload/qBittorrent

          @(
            "qBittorrent repository: ${{ github.repository }}",
            "qBittorrent ref: ${{ github.ref }}",
            "qBittorrent commit: ${{ github.sha }}",
            "libtorrent repository: ${{ env.libtorrent_repository }}",
            "libtorrent ref: ${{ env.libtorrent_ref }}",
            "libtorrent commit: $env:LIBTORRENT_SHA",
            "architecture: ${{ env.target_arch }}",
            "configuration: RelWithDebInfo",
            "Qt: 6.10.3",
            "Boost: 1.91.0",
            "WebTorrent: enabled"
          ) | Set-Content -Path upload/qBittorrent/build-info.txt

          copy "${{ env.Qt_ROOT_DIR }}/bin/Qt6Core.dll" upload/qBittorrent
          copy "${{ env.Qt_ROOT_DIR }}/bin/Qt6Gui.dll" upload/qBittorrent
          copy "${{ env.Qt_ROOT_DIR }}/bin/Qt6Network.dll" upload/qBittorrent
          copy "${{ env.Qt_ROOT_DIR }}/bin/Qt6Sql.dll" upload/qBittorrent
          copy "${{ env.Qt_ROOT_DIR }}/bin/Qt6Svg.dll" upload/qBittorrent
          copy "${{ env.Qt_ROOT_DIR }}/bin/Qt6Widgets.dll" upload/qBittorrent
          copy "${{ env.Qt_ROOT_DIR }}/bin/Qt6Xml.dll" upload/qBittorrent
          mkdir upload/qBittorrent/plugins/iconengines
          copy "${{ env.Qt_ROOT_DIR }}/plugins/iconengines/qsvgicon.dll" upload/qBittorrent/plugins/iconengines
          mkdir upload/qBittorrent/plugins/imageformats
          copy "${{ env.Qt_ROOT_DIR }}/plugins/imageformats/qgif.dll" upload/qBittorrent/plugins/imageformats
          copy "${{ env.Qt_ROOT_DIR }}/plugins/imageformats/qicns.dll" upload/qBittorrent/plugins/imageformats
          copy "${{ env.Qt_ROOT_DIR }}/plugins/imageformats/qico.dll" upload/qBittorrent/plugins/imageformats
          copy "${{ env.Qt_ROOT_DIR }}/plugins/imageformats/qjpeg.dll" upload/qBittorrent/plugins/imageformats
          copy "${{ env.Qt_ROOT_DIR }}/plugins/imageformats/qsvg.dll" upload/qBittorrent/plugins/imageformats
          copy "${{ env.Qt_ROOT_DIR }}/plugins/imageformats/qtga.dll" upload/qBittorrent/plugins/imageformats
          copy "${{ env.Qt_ROOT_DIR }}/plugins/imageformats/qtiff.dll" upload/qBittorrent/plugins/imageformats
          copy "${{ env.Qt_ROOT_DIR }}/plugins/imageformats/qwbmp.dll" upload/qBittorrent/plugins/imageformats
          copy "${{ env.Qt_ROOT_DIR }}/plugins/imageformats/qwebp.dll" upload/qBittorrent/plugins/imageformats
          mkdir upload/qBittorrent/plugins/platforms
          copy "${{ env.Qt_ROOT_DIR }}/plugins/platforms/qwindows.dll" upload/qBittorrent/plugins/platforms
          mkdir upload/qBittorrent/plugins/sqldrivers
          copy "${{ env.Qt_ROOT_DIR }}/plugins/sqldrivers/qsqlite.dll" upload/qBittorrent/plugins/sqldrivers
          mkdir upload/qBittorrent/plugins/styles
          copy "${{ env.Qt_ROOT_DIR }}/plugins/styles/qmodernwindowsstyle.dll" upload/qBittorrent/plugins/styles
          mkdir upload/qBittorrent/plugins/tls
          copy "${{ env.Qt_ROOT_DIR }}/plugins/tls/qschannelbackend.dll" upload/qBittorrent/plugins/tls

          mkdir upload/cmake
          copy build/compile_commands.json upload/cmake
          copy build/target_graph.dot upload/cmake
          mkdir upload/cmake/libtorrent
          copy "${{ env.libtorrent_path }}/build/compile_commands.json" upload/cmake/libtorrent

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qBittorrent-Custom_Windows-x64_libtorrent-${{ env.LIBTORRENT_REF_SAFE }}-${{ env.LIBTORRENT_SHA_SHORT }}
          path: upload

      - name: Install NSIS
        uses: repolevedavaj/install-nsis@1ab2f7ba2fe9408db612029be0bb3c0088b0d3e9 # v1.2.1
        with:
          nsis-version: "3.12"

      - name: Create installer
        run: |
          7z x -o"dist/windows/" "dist/windows/NSISPlugins.zip"
          makensis `
            /DQBT_CPU_ARCH="${{ env.target_arch }}" `
            /DQBT_DIST_DIR="../../upload/qBittorrent" `
            /WX `
            dist/windows/qbittorrent.nsi
          move `
            "dist/windows/qbittorrent_*_setup.exe" `
            "qBittorrent-Custom_Windows-x64_libtorrent-${{ env.LIBTORRENT_REF_SAFE }}-${{ env.LIBTORRENT_SHA_SHORT }}-setup.exe"

      - name: Upload installer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          archive: false
          path: qBittorrent-Custom_Windows-x64_libtorrent-${{ env.LIBTORRENT_REF_SAFE }}-${{ env.LIBTORRENT_SHA_SHORT }}-setup.exe

  update-scoop:
    name: Trigger scoop-bucket Excavator
    needs: ci
    if: >-
      github.ref == 'refs/heads/master' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: scoop-bucket
    permissions:
      contents: read

    steps:
      - name: Dispatch qbittorrent-custom update
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          repository: marcmy/scoop-bucket
          event-type: qbittorrent-custom-built
          client-payload: >-
            {"run_id":"${{ github.run_id }}","head_sha":"${{ github.sha }}"}
