name: CI - File health

on: [pull_request, push]

# Deny all token capabilities unless a job explicitly grants them.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.head_ref != '' }}

jobs:
  ci:
    name: Check
    runs-on: ubuntu-slim
    permissions:
      # Upload the filtered zizmor SARIF report.
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "*"

      - name: Check files
        uses: j178/prek-action@e98a699c41eb69ab013a45817a0406469a748f8d # v2

      - name: Check doc
        env:
          pandoc_path: "${{ github.workspace }}/../pandoc"
          pandoc_version: "3.9.0.2"
        run: |
          # install pandoc
          curl \
            -L \
            -o "${{ runner.temp }}/pandoc.tar.gz" \
            "https://github.com/jgm/pandoc/releases/download/${{ env.pandoc_version }}/pandoc-${{ env.pandoc_version }}-linux-amd64.tar.gz"
          tar -xf "${{ runner.temp }}/pandoc.tar.gz" -C "${{ github.workspace }}/.."
          mv "${{ github.workspace }}/.."/pandoc-* "${{ env.pandoc_path }}"
          # run pandoc
          for lang in doc/*/; do
            "${{ env.pandoc_path }}/bin/pandoc" -f markdown -t man -s "$lang/qbittorrent.1.md" -o "$lang/qbittorrent.1"
            "${{ env.pandoc_path }}/bin/pandoc" -f markdown -t man -s "$lang/qbittorrent-nox.1.md" -o "$lang/qbittorrent-nox.1"
          done
          # check diff, ignore "Automatically generated by ..." part
          git diff -I '\.\\".*' --exit-code

      - name: Check GitHub Actions workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install zizmor
          RESULT_FILTER='(.level != "note")
            and (.ruleId != "zizmor/template-injection")
            and (.ruleId != "zizmor/unpinned-uses")'
          RULE_FILTER='(.id != "zizmor/template-injection")
            and (.id != "zizmor/unpinned-uses")'
          zizmor \
            --format sarif \
            --persona auditor \
            ./ \
            | jq "(.runs[].results |= map(select($RESULT_FILTER)))
              | (.runs[].tool.driver.rules |= map(select($RULE_FILTER)))" \
            > "${{ runner.temp }}/zizmor_results.sarif"

      - name: Upload zizmor results
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: zizmor
          sarif_file: "${{ runner.temp }}/zizmor_results.sarif"
