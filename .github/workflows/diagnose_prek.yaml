name: Diagnostic - prek

on:
  push:
    branches:
      - automation/upstream-sync-f239beb
  pull_request:
    branches:
      - custom/master

permissions:
  contents: read

jobs:
  diagnose:
    name: Capture prek failure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install prek
        uses: j178/prek-action@e98a699c41eb69ab013a45817a0406469a748f8d # v2
        with:
          install-only: true

      - name: Capture diagnostics
        shell: bash
        run: |
          set +e
          prek run --all-files --show-diff-on-failure --color=never > prek.log 2>&1
          status=$?
          git diff --binary > working-tree.diff
          printf '%s\n' "$status" > exit-code.txt
          exit 0

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: prek-diagnostics
          path: |
            prek.log
            working-tree.diff
            exit-code.txt

      - name: Preserve diagnostic status
        shell: bash
        run: exit "$(cat exit-code.txt)"
